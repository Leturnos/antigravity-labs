<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gradient-x" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="gradient-o" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="20" fill="#0b0f19" />
  
  <!-- Board Lines -->
  <line x1="38" y1="15" x2="38" y2="85" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <line x1="62" y1="15" x2="62" y2="85" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <line x1="15" y1="38" x2="85" y2="38" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <line x1="15" y1="62" x2="85" y2="62" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />

  <!-- X in top-left -->
  <path d="M 20 20 L 32 32 M 32 20 L 20 32" stroke="url(#gradient-x)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- O in bottom-right -->
  <circle cx="80" cy="80" r="7.5" fill="none" stroke="url(#gradient-o)" stroke-width="5" filter="url(#glow)" />
</svg>
